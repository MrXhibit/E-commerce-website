name: 🧪 Buy Nest - Comprehensive Testing Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend API Testing
  backend-tests:
    name: 🔧 Backend API Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🔧 Setup environment
      run: |
        echo "NODE_ENV=test" >> $GITHUB_ENV
        echo "DB_URL=mongodb://localhost:27017/buynest_test" >> $GITHUB_ENV
        echo "APP_SCERET=test_secret_key_for_github_actions" >> $GITHUB_ENV

    - name: 🧪 Run backend tests
      run: npm test
      env:
        NODE_ENV: test
        DB_URL: mongodb://localhost:27017/buynest_test
        APP_SCERET: test_secret_key_for_github_actions

    - name: 📊 Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-test-results
        path: |
          coverage/
          test-results/
        retention-days: 7

  # Frontend Component Testing
  frontend-tests:
    name: 🎨 Frontend Component Tests
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install backend dependencies
      run: npm ci

    - name: 📦 Install frontend dependencies
      working-directory: ./client
      run: npm ci

    - name: 🧪 Run frontend tests
      working-directory: ./client
      run: npm test -- --coverage --watchAll=false

    - name: 📊 Upload frontend test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-test-results
        path: |
          client/coverage/
          client/test-results/
        retention-days: 7

  # End-to-End Testing
  e2e-tests:
    name: 🌐 End-to-End Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install backend dependencies
      run: npm ci

    - name: 📦 Install frontend dependencies
      working-directory: ./client
      run: npm ci

    - name: 🔧 Setup environment
      run: |
        echo "NODE_ENV=test" >> $GITHUB_ENV
        echo "DB_URL=mongodb://localhost:27017/buynest_test" >> $GITHUB_ENV
        echo "APP_SCERET=test_secret_key_for_github_actions" >> $GITHUB_ENV

    - name: 🚀 Start backend server
      run: |
        npm run dev &
        sleep 10
      env:
        NODE_ENV: test
        DB_URL: mongodb://localhost:27017/buynest_test
        APP_SCERET: test_secret_key_for_github_actions

    - name: 🚀 Start frontend server
      working-directory: ./client
      run: |
        npm run dev &
        sleep 15
      env:
        VITE_API_URL: http://localhost:5000/api/v1

    - name: 🧪 Run E2E tests
      run: |
        npx cypress run --config baseUrl=http://localhost:5173
      env:
        CYPRESS_baseUrl: http://localhost:5173
        CYPRESS_apiUrl: http://localhost:5000/api/v1

    - name: 📊 Upload E2E test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: |
          cypress/screenshots/
          cypress/videos/
        retention-days: 7

  # Security & Linting
  code-quality:
    name: 🔒 Code Quality & Security
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 📦 Install frontend dependencies
      working-directory: ./client
      run: npm ci

    - name: 🔍 Run ESLint (Backend)
      run: npm run lint

    - name: 🔍 Run ESLint (Frontend)
      working-directory: ./client
      run: npm run lint

    - name: 🎨 Run Prettier check
      run: npm run format:check

    - name: 🔒 Run security audit
      run: npm audit --audit-level moderate

    - name: 🔒 Run frontend security audit
      working-directory: ./client
      run: npm audit --audit-level moderate

  # Performance Testing
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🔧 Setup environment
      run: |
        echo "NODE_ENV=test" >> $GITHUB_ENV
        echo "DB_URL=mongodb://localhost:27017/buynest_test" >> $GITHUB_ENV
        echo "APP_SCERET=test_secret_key_for_github_actions" >> $GITHUB_ENV

    - name: 🚀 Start server
      run: |
        npm run dev &
        sleep 10
      env:
        NODE_ENV: test
        DB_URL: mongodb://localhost:27017/buynest_test
        APP_SCERET: test_secret_key_for_github_actions

    - name: ⚡ Run performance tests
      run: |
        # Test API response times
        curl -w "@curl-format.txt" -o /dev/null -s "http://localhost:5000/api/v1/products" || true
        
        # Test database connection performance
        npm run test:performance || true

    - name: 📊 Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-test-results
        path: |
          performance-results/
        retention-days: 7

  # Test Report Generation
  test-report:
    name: 📊 Generate Test Report
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests, code-quality, performance-tests]
    if: always()

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📥 Download test artifacts
      uses: actions/download-artifact@v4
      with:
        path: test-artifacts

    - name: 📊 Generate comprehensive test report
      run: |
        echo "# 🧪 Buy Nest - Test Execution Report" > TEST_REPORT.md
        echo "" >> TEST_REPORT.md
        echo "## 📅 Test Execution Summary" >> TEST_REPORT.md
        echo "- **Date:** $(date)" >> TEST_REPORT.md
        echo "- **Branch:** ${{ github.ref_name }}" >> TEST_REPORT.md
        echo "- **Commit:** ${{ github.sha }}" >> TEST_REPORT.md
        echo "" >> TEST_REPORT.md
        
        echo "## 🔧 Backend Tests" >> TEST_REPORT.md
        if [ -d "test-artifacts/backend-test-results" ]; then
          echo "✅ Backend tests completed" >> TEST_REPORT.md
        else
          echo "❌ Backend tests failed or incomplete" >> TEST_REPORT.md
        fi
        
        echo "" >> TEST_REPORT.md
        echo "## 🎨 Frontend Tests" >> TEST_REPORT.md
        if [ -d "test-artifacts/frontend-test-results" ]; then
          echo "✅ Frontend tests completed" >> TEST_REPORT.md
        else
          echo "❌ Frontend tests failed or incomplete" >> TEST_REPORT.md
        fi
        
        echo "" >> TEST_REPORT.md
        echo "## 🌐 E2E Tests" >> TEST_REPORT.md
        if [ -d "test-artifacts/e2e-test-results" ]; then
          echo "✅ E2E tests completed" >> TEST_REPORT.md
        else
          echo "❌ E2E tests failed or incomplete" >> TEST_REPORT.md
        fi
        
        echo "" >> TEST_REPORT.md
        echo "## 🔒 Code Quality" >> TEST_REPORT.md
        if [ "${{ needs.code-quality.result }}" == "success" ]; then
          echo "✅ Code quality checks passed" >> TEST_REPORT.md
        else
          echo "❌ Code quality checks failed" >> TEST_REPORT.md
        fi
        
        echo "" >> TEST_REPORT.md
        echo "## ⚡ Performance Tests" >> TEST_REPORT.md
        if [ -d "test-artifacts/performance-test-results" ]; then
          echo "✅ Performance tests completed" >> TEST_REPORT.md
        else
          echo "❌ Performance tests failed or incomplete" >> TEST_REPORT.md
        fi

    - name: 📤 Upload test report
      uses: actions/upload-artifact@v4
      with:
        name: comprehensive-test-report
        path: TEST_REPORT.md
        retention-days: 30

    - name: 📧 Send notification
      if: always()
      run: |
        echo "Test execution completed for ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "View results: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
